name: package-macos-manual

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Clever.TokenMap.sln

      - name: Build
        run: dotnet build Clever.TokenMap.sln --no-restore

      - name: Test
        run: dotnet test Clever.TokenMap.sln --no-build

      - name: Package macOS DMG
        run: bash ./scripts/package-macos-dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenMap-macos-arm64-dmg
          path: .artifacts/macos-arm64/TokenMap-macos-arm64.dmg
          if-no-files-found: error
