name: package-macos-unsigned

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build, for example `main` or `v0.1.0`
        required: true
        default: main
        type: string
      version:
        description: Optional version override to embed in the bundle and DMG name
        required: false
        default: ""
        type: string
      release_tag:
        description: Optional existing GitHub Release tag to attach the DMG to, for example `v0.1.0`
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve packaging metadata
        shell: bash
        run: |
          set -euo pipefail

          ref_input='${{ inputs.ref }}'
          version_input='${{ inputs.version }}'

          if [[ -n "${version_input}" ]]; then
            resolved_version="${version_input}"
          elif [[ "${ref_input}" == v* ]]; then
            resolved_version="${ref_input#v}"
          else
            resolved_version="$(python3 - <<'PY'
import xml.etree.ElementTree as ET

tree = ET.parse("src/Clever.TokenMap.App/Clever.TokenMap.App.csproj")
root = tree.getroot()

for element in root.iter():
    if element.tag.endswith("Version") and element.text and element.text.strip():
        print(element.text.strip())
        break
PY
)"
          fi

          if [[ -z "${resolved_version}" ]]; then
            echo "Unable to resolve macOS package version." >&2
            exit 1
          fi

          artifact_name="TokenMap-macos-arm64-${resolved_version}-unsigned"

          {
            echo "TOKENMAP_MACOS_VERSION=${resolved_version}"
            echo "TOKENMAP_MACOS_ARTIFACT_NAME=${artifact_name}"
            echo "TOKENMAP_MACOS_RELEASE_TAG=${{ inputs.release_tag }}"
          } >> "${GITHUB_ENV}"

      - name: Restore
        run: dotnet restore Clever.TokenMap.sln

      - name: Build
        run: dotnet build Clever.TokenMap.sln --no-restore

      - name: Test
        run: dotnet test Clever.TokenMap.sln --no-build

      - name: Package macOS DMG
        env:
          ARTIFACT_NAME: ${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}
          BUNDLE_VERSION: ${{ env.TOKENMAP_MACOS_VERSION }}
        run: bash ./scripts/package-macos-dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}
          path: .artifacts/macos-arm64/${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}.dmg
          if-no-files-found: error

      - name: Attach DMG to GitHub release
        if: env.TOKENMAP_MACOS_RELEASE_TAG != ''
        run: gh release upload "${{ env.TOKENMAP_MACOS_RELEASE_TAG }}" ".artifacts/macos-arm64/${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}.dmg" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
