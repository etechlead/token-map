name: package-windows

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build, such as main or v0.1.0
        required: true
        default: main
      version:
        description: Optional version override for Windows package names
        required: false
      release_tag:
        description: Optional existing release tag to receive the Windows assets
        required: false
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Checkout release tag
        if: github.event_name == 'release'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve packaging metadata
        shell: pwsh
        run: |
          $version = ''
          $releaseTag = ''

          if ('${{ github.event_name }}' -eq 'release') {
              $releaseTag = '${{ github.event.release.tag_name }}'
              $version = $releaseTag
          }
          else {
              $releaseTag = '${{ inputs.release_tag }}'
              $version = '${{ inputs.version }}'
          }

          if (-not [string]::IsNullOrWhiteSpace($version) -and $version.StartsWith('v')) {
              $version = $version.Substring(1)
          }

          if (-not [string]::IsNullOrWhiteSpace($version)) {
              "TOKENMAP_WINDOWS_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "TOKENMAP_INSTALLER_NAME=TokenMap-win-x64-$version-installer.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "TOKENMAP_STANDALONE_NAME=TokenMap-win-x64-$version-standalone.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          "TOKENMAP_WINDOWS_RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore Clever.TokenMap.sln

      - name: Build
        run: dotnet build Clever.TokenMap.sln --no-restore

      - name: Test
        run: dotnet test Clever.TokenMap.sln --no-build

      - name: Publish installer input
        shell: pwsh
        run: |
          $publishDir = '.artifacts/windows-package-inputs/installer/win-x64'
          if (Test-Path $publishDir) {
              Remove-Item -Path $publishDir -Recurse -Force
          }

          $arguments = @(
              'publish',
              'src/Clever.TokenMap.App/Clever.TokenMap.App.csproj',
              '-c', 'Release',
              '-r', 'win-x64',
              '--self-contained', 'true',
              '-p:PublishSingleFile=false',
              '-p:UseAppHost=true',
              '-o', $publishDir
          )

          if (-not [string]::IsNullOrWhiteSpace($env:TOKENMAP_WINDOWS_VERSION)) {
              $arguments += "-p:Version=$($env:TOKENMAP_WINDOWS_VERSION)"
          }

          & dotnet @arguments

      - name: Publish standalone input
        shell: pwsh
        run: |
          $publishDir = '.artifacts/windows-package-inputs/standalone/win-x64'
          if (Test-Path $publishDir) {
              Remove-Item -Path $publishDir -Recurse -Force
          }

          $arguments = @(
              'publish',
              'src/Clever.TokenMap.App/Clever.TokenMap.App.csproj',
              '-c', 'Release',
              '-r', 'win-x64',
              '--self-contained', 'true',
              '-p:PublishSingleFile=true',
              '-p:IncludeNativeLibrariesForSelfExtract=true',
              '-p:UseAppHost=true',
              '-o', $publishDir
          )

          if (-not [string]::IsNullOrWhiteSpace($env:TOKENMAP_WINDOWS_VERSION)) {
              $arguments += "-p:Version=$($env:TOKENMAP_WINDOWS_VERSION)"
          }

          & dotnet @arguments

      - name: Package Windows installer
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TOKENMAP_WINDOWS_VERSION)) {
              ./scripts/publish-windows-installer.ps1 -PublishDirectory '.artifacts/windows-package-inputs/installer/win-x64'
              exit 0
          }

          ./scripts/publish-windows-installer.ps1 -Version $env:TOKENMAP_WINDOWS_VERSION -PublishDirectory '.artifacts/windows-package-inputs/installer/win-x64'

      - name: Package Windows standalone archive
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TOKENMAP_WINDOWS_VERSION)) {
              ./scripts/publish-windows-standalone.ps1 -PublishDirectory '.artifacts/windows-package-inputs/standalone/win-x64'
              exit 0
          }

          ./scripts/publish-windows-standalone.ps1 -Version $env:TOKENMAP_WINDOWS_VERSION -PublishDirectory '.artifacts/windows-package-inputs/standalone/win-x64'

      - name: Resolve installer path
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path '.artifacts/windows-installer/installer/*.exe' | Select-Object -First 1
          if ($null -eq $installer) {
              throw 'Windows installer artifact was not found.'
          }

          "TOKENMAP_INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TOKENMAP_INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve standalone archive path
        shell: pwsh
        run: |
          $archive = Get-ChildItem -Path '.artifacts/windows-standalone/standalone/*.zip' | Select-Object -First 1
          if ($null -eq $archive) {
              throw 'Windows standalone archive was not found.'
          }

          "TOKENMAP_STANDALONE_PATH=$($archive.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TOKENMAP_STANDALONE_NAME=$($archive.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload installer workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TOKENMAP_INSTALLER_NAME }}
          path: ${{ env.TOKENMAP_INSTALLER_PATH }}
          if-no-files-found: error

      - name: Upload standalone workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TOKENMAP_STANDALONE_NAME }}
          path: ${{ env.TOKENMAP_STANDALONE_PATH }}
          if-no-files-found: error

      - name: Attach installer to GitHub release
        if: env.TOKENMAP_WINDOWS_RELEASE_TAG != ''
        run: gh release upload "${{ env.TOKENMAP_WINDOWS_RELEASE_TAG }}" "${{ env.TOKENMAP_INSTALLER_PATH }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach standalone archive to GitHub release
        if: env.TOKENMAP_WINDOWS_RELEASE_TAG != ''
        run: gh release upload "${{ env.TOKENMAP_WINDOWS_RELEASE_TAG }}" "${{ env.TOKENMAP_STANDALONE_PATH }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
