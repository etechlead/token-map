name: package-windows

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build, such as main or v0.1.0
        required: true
        default: main
      version:
        description: Optional version override for Windows package names
        required: false
      release_tag:
        description: Optional existing release tag to receive the Windows assets
        required: false
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Checkout release tag
        if: github.event_name == 'release'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve packaging metadata
        shell: pwsh
        run: |
          $version = ''
          $releaseTag = ''

          if ('${{ github.event_name }}' -eq 'release') {
              $releaseTag = '${{ github.event.release.tag_name }}'
              $version = $releaseTag
          }
          else {
              $releaseTag = '${{ inputs.release_tag }}'
              $version = '${{ inputs.version }}'
          }

          if (-not [string]::IsNullOrWhiteSpace($version) -and $version.StartsWith('v')) {
              $version = $version.Substring(1)
          }

          if (-not [string]::IsNullOrWhiteSpace($version)) {
              "TOKENMAP_WINDOWS_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          "TOKENMAP_WINDOWS_RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore Clever.TokenMap.sln

      - name: Build
        run: dotnet build Clever.TokenMap.sln --no-restore

      - name: Test
        run: dotnet test Clever.TokenMap.sln --no-build

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TOKENMAP_WINDOWS_VERSION)) {
              ./scripts/package-windows.ps1
              exit 0
          }

          ./scripts/package-windows.ps1 -Version $env:TOKENMAP_WINDOWS_VERSION

      - name: Resolve setup path
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path '.artifacts/windows-installer/installer/*.exe' | Select-Object -First 1
          if ($null -eq $installer) {
              throw 'Windows setup artifact was not found.'
          }

          "TOKENMAP_SETUP_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TOKENMAP_SETUP_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve portable archive path
        shell: pwsh
        run: |
          $archive = Get-ChildItem -Path '.artifacts/windows-portable/portable/*.zip' | Select-Object -First 1
          if ($null -eq $archive) {
              throw 'Windows portable archive was not found.'
          }

          "TOKENMAP_PORTABLE_PATH=$($archive.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TOKENMAP_PORTABLE_NAME=$($archive.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload setup workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TOKENMAP_SETUP_NAME }}
          path: ${{ env.TOKENMAP_SETUP_PATH }}
          if-no-files-found: error

      - name: Upload portable workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TOKENMAP_PORTABLE_NAME }}
          path: ${{ env.TOKENMAP_PORTABLE_PATH }}
          if-no-files-found: error

      - name: Attach setup to GitHub release
        if: env.TOKENMAP_WINDOWS_RELEASE_TAG != ''
        run: gh release upload "${{ env.TOKENMAP_WINDOWS_RELEASE_TAG }}" "${{ env.TOKENMAP_SETUP_PATH }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach portable archive to GitHub release
        if: env.TOKENMAP_WINDOWS_RELEASE_TAG != ''
        run: gh release upload "${{ env.TOKENMAP_WINDOWS_RELEASE_TAG }}" "${{ env.TOKENMAP_PORTABLE_PATH }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
