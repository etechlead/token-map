name: package-macos

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build, such as main or v0.1.0
        required: true
        default: main
      run_tests:
        description: Set to false to skip tests for older tags that are packaging-only
        required: true
        default: true
      version:
        description: Optional version override for the app bundle and DMG
        required: false
      release_tag:
        description: Optional existing release tag to receive the DMG asset
        required: false

permissions:
  contents: write

jobs:
  package-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve packaging metadata
        shell: bash
        run: |
          set -euo pipefail
          source ./scripts/packaging-metadata.sh
          initialize_packaging_metadata "$PWD"

          project_path="$(get_packaging_metadata_value '//PackagingMetadata/ProjectPath')"
          fallback_local_version="$(get_packaging_metadata_value '//PackagingMetadata/FallbackLocalVersion')"

          git_ref='${{ inputs.git_ref }}'
          version_input='${{ inputs.version }}'
          release_tag_input='${{ inputs.release_tag }}'

          if [[ -n "${version_input}" ]]; then
            resolved_version="${version_input}"
          elif [[ "${git_ref}" == v* ]]; then
            resolved_version="${git_ref#v}"
          else
            resolved_version="$(get_xml_value "${project_path}" '//Version')"
          fi

          if [[ -z "${resolved_version}" ]]; then
            resolved_version="${fallback_local_version}"
          fi

          if [[ -z "${resolved_version}" ]]; then
            echo "Unable to resolve macOS package version." >&2
            exit 1
          fi

          {
            echo "TOKENMAP_MACOS_VERSION=${resolved_version}"
            echo "TOKENMAP_MACOS_RELEASE_TAG=${release_tag_input}"
          } >> "${GITHUB_ENV}"

      - name: Restore
        run: dotnet restore Clever.TokenMap.sln

      - name: Build
        run: dotnet build Clever.TokenMap.sln --no-restore

      - name: Test
        if: inputs.run_tests != 'false'
        run: dotnet test Clever.TokenMap.sln --no-build

      - name: Package macOS artifacts
        env:
          BUNDLE_VERSION: ${{ env.TOKENMAP_MACOS_VERSION }}
        run: bash ./scripts/package-macos.sh

      - name: Resolve macOS artifact paths
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="$(find .artifacts/macos-arm64 -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          zip_path="$(find .artifacts/macos-arm64 -maxdepth 1 -type f -name '*.zip' | head -n 1)"

          if [[ -z "${dmg_path}" || -z "${zip_path}" ]]; then
            echo "Expected macOS package artifacts were not found." >&2
            exit 1
          fi

          dmg_name="$(basename "${dmg_path}")"
          zip_name="$(basename "${zip_path}")"
          artifact_upload_name="${dmg_name%.dmg}"

          {
            echo "TOKENMAP_MACOS_DMG_PATH=${dmg_path}"
            echo "TOKENMAP_MACOS_DMG_NAME=${dmg_name}"
            echo "TOKENMAP_MACOS_PORTABLE_PATH=${zip_path}"
            echo "TOKENMAP_MACOS_PORTABLE_NAME=${zip_name}"
            echo "TOKENMAP_MACOS_ARTIFACT_BASE_NAME=${artifact_upload_name}"
          } >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TOKENMAP_MACOS_ARTIFACT_BASE_NAME }}
          path: |
            ${{ env.TOKENMAP_MACOS_DMG_PATH }}
            ${{ env.TOKENMAP_MACOS_PORTABLE_PATH }}
          if-no-files-found: error

      - name: Attach macOS artifacts to GitHub release
        if: env.TOKENMAP_MACOS_RELEASE_TAG != ''
        run: |
          gh release upload "${{ env.TOKENMAP_MACOS_RELEASE_TAG }}" \
            "${{ env.TOKENMAP_MACOS_DMG_PATH }}" \
            "${{ env.TOKENMAP_MACOS_PORTABLE_PATH }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
