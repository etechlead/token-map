name: package-macos-unsigned

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build, such as main or v0.1.0
        required: true
        default: main
      run_tests:
        description: Set to false to skip tests for older tags that are packaging-only
        required: true
        default: true
      version:
        description: Optional version override for the app bundle and DMG
        required: false
      release_tag:
        description: Optional existing release tag to receive the DMG asset
        required: false

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve packaging metadata
        shell: bash
        run: |
          set -euo pipefail

          git_ref='${{ inputs.git_ref }}'
          version_input='${{ inputs.version }}'
          release_tag_input='${{ inputs.release_tag }}'

          if [[ -n "${version_input}" ]]; then
            resolved_version="${version_input}"
          elif [[ "${git_ref}" == v* ]]; then
            resolved_version="${git_ref#v}"
          else
            resolved_version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/Clever.TokenMap.App/Clever.TokenMap.App.csproj | head -n 1)"
          fi

          if [[ -z "${resolved_version}" ]]; then
            echo "Unable to resolve macOS package version." >&2
            exit 1
          fi

          artifact_name="TokenMap-macos-arm64-${resolved_version}-unsigned"

          {
            echo "TOKENMAP_MACOS_VERSION=${resolved_version}"
            echo "TOKENMAP_MACOS_ARTIFACT_NAME=${artifact_name}"
            echo "TOKENMAP_MACOS_RELEASE_TAG=${release_tag_input}"
          } >> "${GITHUB_ENV}"

      - name: Restore
        run: dotnet restore Clever.TokenMap.sln

      - name: Build
        run: dotnet build Clever.TokenMap.sln --no-restore

      - name: Test
        if: inputs.run_tests != 'false'
        run: dotnet test Clever.TokenMap.sln --no-build

      - name: Package macOS DMG
        env:
          ARTIFACT_NAME: ${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}
          BUNDLE_VERSION: ${{ env.TOKENMAP_MACOS_VERSION }}
        run: bash ./scripts/package-macos-dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}
          path: .artifacts/macos-arm64/${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}.dmg
          if-no-files-found: error

      - name: Attach DMG to GitHub release
        if: env.TOKENMAP_MACOS_RELEASE_TAG != ''
        run: gh release upload "${{ env.TOKENMAP_MACOS_RELEASE_TAG }}" ".artifacts/macos-arm64/${{ env.TOKENMAP_MACOS_ARTIFACT_NAME }}.dmg" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
